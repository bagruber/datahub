<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moosburg Data Hub</title>
  <meta name="description" content="Interaktive Daten-Dashboards der Stadt Moosburg a.d. Isar" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }
    body { font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; color: #333; }
    #root { min-height: 100vh; }
    .loading-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; font-family: 'Noto Serif', Georgia, serif; color: #9B0000;
    }
    .loading-screen .spinner {
      width: 36px; height: 36px; border: 3px solid #eae7e2; border-top-color: #9B0000;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen .error { color: #c00; font-family: sans-serif; font-size: 14px; margin-top: 12px; max-width: 400px; text-align: center; }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div>Moosburg Data Hub</div>
    </div>
  </div>

  <script>
    (async function boot() {
      const root = document.getElementById('root');
      try {
        const base = document.querySelector('base')?.href || './';
        const mRes = await fetch(base + 'data/manifest.json');
        if (!mRes.ok) throw new Error('Manifest konnte nicht geladen werden.');
        window.__MANIFEST__ = await mRes.json();
        window.__BASE__ = base;

        const appScript = document.getElementById('app-jsx');
        if (appScript) {
          const code = appScript.textContent;
          const transformed = Babel.transform(code, { presets: ['react'] }).code;
          const script = document.createElement('script');
          script.textContent = transformed;
          document.head.appendChild(script);
          const reactRoot = ReactDOM.createRoot(root);
          reactRoot.render(React.createElement(App));
        }
      } catch (err) {
        root.innerHTML = '<div class="loading-screen"><div style="font-size:18px">Moosburg Data Hub</div><div class="error">Fehler beim Laden: ' + err.message + '<br><br>Bitte laden Sie die Seite neu.</div></div>';
        console.error(err);
      }
    })();
  </script>

  <script id="app-jsx" type="text/plain">
const { useState, useMemo, useCallback, useRef, useEffect } = React;

/* ========== THEME ========== */
const T = {
  red: ["#5A070A", "#9B0000", "#E6001E"],
  gold: "#B39F7A", goldLight: "#D4C9A8", goldDark: "#8A7A5A",
  rainbow: ["#E6001E","#CD0078","#008CE6","#78BE1E","#FFAA00","#00B5AD","#9B59B6","#E67E22","#2ECC71","#3498DB"],
  likert6: ["#8c6d4f","#c29a6e","#e6d5b8","#b8d8d0","#6bb5a5","#2e8b7a"],
  likert6cb: ["#d73027","#fc8d59","#fee08b","#d9ef8b","#91cf60","#1a9850"],
  likert5: ["#c06040","#e0a878","#e6ddd4","#90b8b0","#3a8a7a"],
  likert5cb: ["#d73027","#fc8d59","#ffffbf","#91bfdb","#4575b4"],
  chartColors: ["#E6001E","#008CE6","#78BE1E","#CD0078","#FFAA00","#00B5AD","#9B59B6","#E67E22","#2ECC71","#3498DB"],
  serif: "'Noto Serif', Georgia, serif",
  sans: "'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif",
  radius: 6,
};

/* ========== HELPERS ========== */
const S = (base, lg) => lg === "large" ? Math.round(base * 1.2) : base;
const pct = (n, t) => t ? Math.round(n / t * 1000) / 10 : 0;
const renderBold = (text) => {
  if (!text) return null;
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p, i) => p.startsWith("**") ? React.createElement("strong", { key: i }, p.slice(2, -2)) : p);
};

/* ========== FONT LOADER ========== */
const FontLoader = () => {
  useEffect(() => {
    const link = document.createElement("link");
    link.href = "https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500;700&family=Noto+Sans:wght@400;500;600;700&display=swap";
    link.rel = "stylesheet";
    document.head.appendChild(link);
  }, []);
  return null;
};

/* ========== LAZY DATASET LOADING ========== */
function useDataset(id) {
  const cache = useRef({});
  const [ds, setDs] = useState(null);
  const [loading, setLoading] = useState(false);
  useEffect(() => {
    if (!id) { setDs(null); return; }
    if (cache.current[id]) { setDs(cache.current[id]); return; }
    setLoading(true);
    const entry = window.__MANIFEST__.datasets.find(d => d.id === id);
    if (!entry) { setLoading(false); return; }
    fetch(window.__BASE__ + 'data/' + entry.file)
      .then(r => r.json())
      .then(data => { cache.current[id] = data; setDs(data); setLoading(false); })
      .catch(() => setLoading(false));
  }, [id]);
  return { ds, loading };
}

/* ========== SHARED TOOLTIP ========== */
function useTooltip() {
  const [tip, setTip] = useState(null);
  const show = useCallback((e, text) => {
    const { clientX: x, clientY: y } = e.touches ? e.touches[0] : e;
    setTip({ x, y, text });
    if (e.touches) setTimeout(() => setTip(null), 2200);
  }, []);
  const hide = useCallback(() => setTip(null), []);
  return { tip, show, hide };
}
function Tooltip({ tip }) {
  if (!tip) return null;
  return <div style={{ position:"fixed", top:tip.y-40, left:Math.min(tip.x+10, window.innerWidth-220), background:"#fff", border:"1px solid #e0ddd8", borderRadius:T.radius, padding:"4px 8px", fontSize:11, zIndex:200, pointerEvents:"none", whiteSpace:"nowrap", boxShadow:"0 2px 8px rgba(0,0,0,0.1)", fontFamily:T.sans }}>{tip.text}</div>;
}

/* ========== UI COMPONENTS ========== */
function Modal({ open, onClose, children }) {
  if (!open) return null;
  return <>
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.25)", zIndex:200 }} />
    <div style={{ position:"fixed", top:"50%", left:"50%", transform:"translate(-50%,-50%)", background:"#fff", borderRadius:T.radius+4, padding:"24px 28px", maxWidth:380, width:"90%", zIndex:210, boxShadow:"0 8px 32px rgba(0,0,0,0.15)", fontFamily:T.sans, fontSize:14, lineHeight:1.7, color:"#444" }}>
      <button onClick={onClose} style={{ position:"absolute", top:10, right:14, background:"none", border:"none", fontSize:18, cursor:"pointer", color:"#aaa" }}>✕</button>
      {children}
    </div>
  </>;
}

function InfoBtn({ text }) {
  const [open, setOpen] = useState(false);
  return <span style={{ position:"relative", display:"inline-block", marginLeft:6 }}>
    <button onClick={()=>setOpen(!open)} style={{ width:18, height:18, borderRadius:"50%", border:"1px solid "+T.gold, background:"none", color:T.gold, fontSize:11, cursor:"pointer", lineHeight:1, fontFamily:T.sans, fontWeight:600 }}>?</button>
    {open && <>
      <div onClick={()=>setOpen(false)} style={{ position:"fixed", inset:0, zIndex:90 }} />
      <div style={{ position:"absolute", top:28, left:-140, width:280, padding:"12px 14px", background:"#fff", border:"1px solid "+T.goldLight, borderRadius:T.radius+2, fontSize:13, color:"#555", zIndex:100, lineHeight:1.6, boxShadow:"0 4px 16px rgba(0,0,0,0.1)", fontFamily:T.sans, textTransform:"none", letterSpacing:"normal", fontWeight:400 }}>
        {text}
        <div style={{ textAlign:"right", marginTop:6 }}><button onClick={()=>setOpen(false)} style={{ fontSize:11, color:T.gold, background:"none", border:"none", cursor:"pointer" }}>Schließen</button></div>
      </div>
    </>}
  </span>;
}

function Sec({ title, info, children, lg }) {
  return <div style={{ marginBottom:20, paddingBottom:12, borderBottom:"1px solid #eae7e2" }}>
    <div style={{ fontFamily:T.serif, fontSize:S(14,lg), fontWeight:700, color:T.goldDark, textTransform:"uppercase", letterSpacing:1.5, marginBottom:8 }}>
      {title}{info && <InfoBtn text={info} />}
    </div>
    {children}
  </div>;
}

/* ========== D3 CHART COMPONENTS ========== */

/* --- BAR CHART (horizontal) --- */
function BarChart({ chart, data, total, lg }) {
  const { tip, show, hide } = useTooltip();
  const items = useMemo(() => {
    if (chart.multi && chart.codes) {
      return chart.codes.map((code, i) => ({
        label: chart.labels[i],
        count: data.filter(r => (r[chart.source] || []).includes(code)).length
      }));
    }
    if (chart.items) {
      return chart.items.map(it => ({
        label: it.label,
        count: data.filter(r => it.vals.includes(r[chart.source])).length
      }));
    }
    return [];
  }, [data, chart]);

  const sorted = chart.sort === "desc" ? [...items].sort((a, b) => b.count - a.count) : items;
  const xScale = d3.scaleLinear().domain([0, d3.max(sorted, d => d.count) || 1]).range([0, 100]);

  return <div style={{ marginBottom:16 }}>
    {chart.title && <div style={{ fontSize:S(12,lg), fontWeight:600, color:"#555", marginBottom:6, fontFamily:T.sans }}>{chart.title}{chart.note && <span style={{ fontWeight:400, color:"#999", marginLeft:6, fontSize:11 }}>({chart.note})</span>}</div>}
    {sorted.map((it, i) => {
      const tipText = it.label + ": " + it.count + " (" + pct(it.count, total) + "%)";
      return <div key={i} style={{ display:"flex", alignItems:"center", marginBottom:3, cursor:"default" }}
        onMouseEnter={e => show(e, tipText)} onMouseLeave={hide}
        onTouchStart={e => show(e, tipText)}>
        <div style={{ width:S(110,lg), fontSize:S(11,lg), color:"#666", textAlign:"right", paddingRight:8, flexShrink:0, fontFamily:T.sans }}>{it.label}</div>
        <div style={{ flex:1, background:"#f5f3f0", borderRadius:3, overflow:"hidden", height:18 }}>
          <div style={{ width:xScale(it.count)+"%", height:"100%", background:chart.color||T.red[2], borderRadius:3, transition:"width 0.4s ease" }} />
        </div>
        <div style={{ width:36, fontSize:10, color:"#999", textAlign:"right", paddingLeft:4, fontFamily:T.sans }}>{it.count}</div>
      </div>;
    })}
    <Tooltip tip={tip} />
  </div>;
}

/* --- BAR HORIZONTAL MULTI (object-source like times) --- */
function BarMultiChart({ chart, data, total, lg }) {
  const { tip, show, hide } = useTooltip();
  const items = useMemo(() => {
    const codes = chart.labels.map((_, i) => i + 1);
    return codes.map((code, i) => ({
      label: chart.labels[i],
      count: data.filter(r => Object.values(r[chart.source] || {}).includes(code)).length
    }));
  }, [data, chart]);

  const xScale = d3.scaleLinear().domain([0, d3.max(items, d => d.count) || 1]).range([0, 100]);

  return <div style={{ marginBottom:16 }}>
    {chart.title && <div style={{ fontSize:S(12,lg), fontWeight:600, color:"#555", marginBottom:6, fontFamily:T.sans }}>{chart.title}{chart.note && <span style={{ fontWeight:400, color:"#999", marginLeft:6, fontSize:11 }}>({chart.note})</span>}</div>}
    {items.map((it, i) => {
      const tipText = it.label + ": " + it.count + " (" + pct(it.count, total) + "%)";
      return <div key={i} style={{ display:"flex", alignItems:"center", marginBottom:3, cursor:"default" }}
        onMouseEnter={e => show(e, tipText)} onMouseLeave={hide} onTouchStart={e => show(e, tipText)}>
        <div style={{ width:S(110,lg), fontSize:S(11,lg), color:"#666", textAlign:"right", paddingRight:8, flexShrink:0, fontFamily:T.sans }}>{it.label}</div>
        <div style={{ flex:1, background:"#f5f3f0", borderRadius:3, overflow:"hidden", height:18 }}>
          <div style={{ width:xScale(it.count)+"%", height:"100%", background:chart.color||T.red[2], borderRadius:3, transition:"width 0.4s ease" }} />
        </div>
        <div style={{ width:36, fontSize:10, color:"#999", textAlign:"right", paddingLeft:4, fontFamily:T.sans }}>{it.count}</div>
      </div>;
    })}
    <Tooltip tip={tip} />
  </div>;
}

/* --- PIE CHART (d3.pie + d3.arc) --- */
function PieChart({ chart, data, total, lg }) {
  const { tip, show, hide } = useTooltip();
  const slices = useMemo(() => {
    const vals = chart.values || chart.labels.map((_, i) => i + 1);
    return vals.map((v, i) => ({
      label: chart.labels[i],
      count: data.filter(r => r[chart.source] === v).length,
      color: (chart.colors || T.chartColors)[i]
    }));
  }, [data, chart]);

  const pieGen = d3.pie().value(d => d.count).sort(null);
  const arcGen = d3.arc().innerRadius(0).outerRadius(55);
  const arcs = pieGen(slices);

  return <div style={{ display:"inline-block", margin:"0 12px 16px", textAlign:"center", verticalAlign:"top" }}>
    {chart.title && <div style={{ fontSize:S(12,lg), fontWeight:600, color:"#555", marginBottom:4, fontFamily:T.sans }}>{chart.title}</div>}
    <svg viewBox="-65 -65 130 130" width="130" height="130">
      {arcs.map((a, i) => {
        const tipText = slices[i].label + ": " + slices[i].count + " (" + pct(slices[i].count, total) + "%)";
        return <path key={i} d={arcGen(a)} fill={slices[i].color} stroke="#fff" strokeWidth="1.5" style={{ cursor:"default" }}
          onMouseEnter={e => show(e, tipText)} onMouseLeave={hide} onTouchStart={e => show(e, tipText)} />;
      })}
    </svg>
    <div style={{ display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap", marginTop:4 }}>
      {slices.map((s, i) => <span key={i} style={{ fontSize:10, color:"#666", display:"flex", alignItems:"center", gap:3, fontFamily:T.sans }}>
        <span style={{ width:8, height:8, borderRadius:2, background:s.color, flexShrink:0 }} />{s.label}
      </span>)}
    </div>
    <Tooltip tip={tip} />
  </div>;
}

/* --- LIKERT ROW (unified 5 or 6 point) --- */
function LikertRow({ counts, total, label, scaleMax, inverted, cb, lg }) {
  const { tip, show, hide } = useTooltip();
  const palette = scaleMax === 5 ? (cb ? T.likert5cb : T.likert5) : (cb ? T.likert6cb : T.likert6);
  const colors = inverted ? [...palette].reverse() : palette;
  const center = scaleMax === 5 ? 3 : 3.5;
  const mean = total > 0 ? d3.sum(counts.map((c, i) => c * (i + 1))) / total : 0;
  const pcts = counts.map(c => total > 0 ? c / total * 100 : 0);

  /* Split at center: for 6-point center=3.5, left=[0..2], right=[3..5]; for 5-point center=3, left=[0..1], split neutral, right=[3..4] */
  const leftIdx = Math.floor(center - 1);
  const splitNeutral = scaleMax === 5;

  return <div style={{ display:"flex", alignItems:"center", marginBottom:4 }}>
    <div style={{ width:S(130,lg), fontSize:S(10,lg), color:"#555", textAlign:"right", paddingRight:8, flexShrink:0, fontFamily:T.sans, lineHeight:1.3 }}>
      {label} <span style={{ color:"#bbb", fontSize:S(9,lg) }}>({"Ø " + mean.toFixed(1)})</span>
    </div>
    <div style={{ flex:1, position:"relative" }}>
      <svg viewBox="0 0 200 14" width="100%" height={S(14,lg)} preserveAspectRatio="none">
        {(() => {
          const wFactor = 1;
          let leftW = 0, rightW = 0;
          const rects = [];
          /* left side (values below center, drawn right-to-left from center) */
          for (let i = leftIdx; i >= 0; i--) {
            leftW += pcts[i] * wFactor;
          }
          /* right side */
          const rightStart = splitNeutral ? leftIdx + 1 : leftIdx + 1;
          for (let i = rightStart; i < scaleMax; i++) {
            rightW += pcts[i] * wFactor;
          }
          if (splitNeutral) {
            leftW += pcts[leftIdx] * wFactor * 0.5;
            rightW += pcts[leftIdx] * wFactor * 0.5;
          }
          const cx = 100;
          /* draw left segments */
          let x = cx;
          for (let i = leftIdx; i >= 0; i--) {
            const w = pcts[i] * wFactor;
            x -= w;
            const tipText = (i + 1) + ": " + counts[i] + " (" + pcts[i].toFixed(1) + "%)";
            rects.push(<rect key={"l"+i} x={x} y={0} width={Math.max(w, 0.2)} height={14} fill={colors[i]}
              onMouseEnter={e => show(e, tipText)} onMouseLeave={hide} onTouchStart={e => show(e, tipText)} style={{ cursor:"default" }} />);
          }
          if (splitNeutral) {
            const nw = pcts[leftIdx] * wFactor * 0.5;
            const tipText = (leftIdx + 1) + ": " + counts[leftIdx] + " (" + pcts[leftIdx].toFixed(1) + "%)";
            x -= nw;
            rects.push(<rect key="nl" x={x} y={0} width={Math.max(nw, 0.1)} height={14} fill={colors[leftIdx]}
              onMouseEnter={e => show(e, tipText)} onMouseLeave={hide} onTouchStart={e => show(e, tipText)} style={{ cursor:"default" }} />);
          }
          /* draw right segments */
          x = cx;
          for (let i = (splitNeutral ? leftIdx + 1 : leftIdx + 1); i < scaleMax; i++) {
            const w = pcts[i] * wFactor;
            const tipText = (i + 1) + ": " + counts[i] + " (" + pcts[i].toFixed(1) + "%)";
            rects.push(<rect key={"r"+i} x={x} y={0} width={Math.max(w, 0.2)} height={14} fill={colors[i]}
              onMouseEnter={e => show(e, tipText)} onMouseLeave={hide} onTouchStart={e => show(e, tipText)} style={{ cursor:"default" }} />);
            x += w;
          }
          if (splitNeutral) {
            const nw = pcts[leftIdx] * wFactor * 0.5;
            const tipText = (leftIdx + 1) + ": " + counts[leftIdx] + " (" + pcts[leftIdx].toFixed(1) + "%)";
            rects.push(<rect key="nr" x={cx} y={0} width={Math.max(nw, 0.1)} height={14} fill={colors[leftIdx]}
              onMouseEnter={e => show(e, tipText)} onMouseLeave={hide} onTouchStart={e => show(e, tipText)} style={{ cursor:"default" }} />);
          }
          /* center line */
          rects.push(<line key="ctr" x1={cx} y1={0} x2={cx} y2={14} stroke="#888" strokeWidth={0.4} style={{ zIndex:2 }} />);
          return rects;
        })()}
      </svg>
    </div>
    <Tooltip tip={tip} />
  </div>;
}

/* --- LIKERT6 CHART (section chart wrapper) --- */
function Likert6Chart({ chart, data, total, cb, lg }) {
  const groups = useMemo(() => {
    const gMap = new Map();
    (chart.items || []).forEach(it => {
      const g = it.group || "";
      if (!gMap.has(g)) gMap.set(g, []);
      gMap.get(g).push(it);
    });
    return gMap;
  }, [chart]);

  return <div>
    <div style={{ display:"flex", justifyContent:"space-between", fontSize:S(10,lg), color:"#999", marginBottom:6, padding:lg==="large"?"0 0 0 158px":"0 0 0 138px", fontFamily:T.sans }}>
      <span>{"← weniger"}</span><span>{"mehr →"}</span>
    </div>
    {[...groups.entries()].map(([gName, items]) => <div key={gName} style={{ marginBottom:10 }}>
      {gName && <div style={{ fontFamily:T.serif, fontSize:S(11,lg), fontWeight:600, color:T.goldDark, marginBottom:3, textTransform:"uppercase", letterSpacing:1 }}>{gName}</div>}
      {items.map(it => {
        const counts = Array(6).fill(0);
        data.forEach(r => { const v = r[it.source]; if (v >= 1 && v <= 6) counts[v - 1]++; });
        const t = d3.sum(counts);
        return <LikertRow key={it.source} counts={counts} total={t} label={it.label} scaleMax={6} cb={cb} lg={lg} />;
      })}
    </div>)}
    <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:6, fontSize:S(10,lg), color:"#999", fontFamily:T.sans }}>
      {[1,2,3,4,5,6].map(v => <span key={v} style={{ display:"flex", alignItems:"center", gap:3 }}>
        <span style={{ width:10, height:10, borderRadius:2, background:(cb?T.likert6cb:T.likert6)[v-1] }} />{v}
      </span>)}
    </div>
  </div>;
}

/* --- LIKERT5 GROUP CHART --- */
function Likert5GroupChart({ chart, data, total, cb, lg }) {
  return <div>
    <div style={{ display:"flex", justifyContent:"space-between", fontSize:S(10,lg), color:"#999", marginBottom:6, padding:lg==="large"?"0 0 0 158px":"0 0 0 138px", fontFamily:T.sans }}>
      <span>{"← Ablehnung"}</span><span>{"Zustimmung →"}</span>
    </div>
    {(chart.innovations || []).map(inno => <div key={inno.key} style={{ marginBottom:12 }}>
      <div style={{ fontFamily:T.serif, fontSize:S(12,lg), fontWeight:600, color:T.goldDark, marginBottom:4 }}>{inno.name}</div>
      {(inno.sources || []).map((src, di) => {
        const counts = Array(5).fill(0);
        data.forEach(r => { const v = r[src]; if (v >= 1 && v <= 5) counts[v - 1]++; });
        const t = d3.sum(counts);
        const inv = (chart.invertedDims || []).includes(di);
        return <LikertRow key={src} counts={counts} total={t} label={chart.dimLabels[di]} scaleMax={5} inverted={inv} cb={cb} lg={lg} />;
      })}
    </div>)}
    <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:6, fontSize:S(10,lg), color:"#999", fontFamily:T.sans }}>
      {[1,2,3,4,5].map(v => <span key={v} style={{ display:"flex", alignItems:"center", gap:3 }}>
        <span style={{ width:10, height:10, borderRadius:2, background:(cb?T.likert5cb:T.likert5)[v-1] }} />{v}
      </span>)}
    </div>
  </div>;
}

/* --- RADAR CHART (d3.lineRadial) --- */
function RadarChart({ chart, data, total, lg }) {
  const { tip, show, hide } = useTooltip();
  const [hidden, setHidden] = useState({});
  const ndims = chart.dimLabels.length;
  const angleStep = (2 * Math.PI) / ndims;
  const R = 100, cx = 150, cy = 150;
  const rScale = d3.scaleLinear().domain([0, 5]).range([0, R]);

  const series = useMemo(() => (chart.innovations || []).map(inno => {
    const vals = (inno.sources || []).map(src => {
      const arr = data.map(r => r[src]).filter(v => v >= 1 && v <= 5);
      return arr.length ? d3.mean(arr) : 0;
    });
    return { name: inno.name, color: inno.color, values: vals };
  }), [data, chart]);

  const gridLevels = [1, 2, 3, 4, 5];
  const lineGen = d3.lineRadial().angle((d, i) => i * angleStep).curve(d3.curveLinearClosed);

  return <div style={{ marginBottom:16 }}>
    <svg viewBox="0 0 300 300" width="100%" style={{ maxWidth:300 }}>
      {/* grid */}
      {gridLevels.map(lv => {
        const pts = Array.from({length: ndims}, (_, i) => [i * angleStep, rScale(lv)]);
        return <path key={lv} d={lineGen(pts)} fill="none" stroke="#e0ddd8" strokeWidth={lv===5?1:0.5} />;
      })}
      {/* axes */}
      {chart.dimLabels.map((lbl, i) => {
        const a = i * angleStep - Math.PI / 2;
        const x2 = cx + R * Math.cos(a), y2 = cy + R * Math.sin(a);
        const lx = cx + (R + 18) * Math.cos(a), ly = cy + (R + 18) * Math.sin(a);
        return <g key={i}>
          <line x1={cx} y1={cy} x2={x2} y2={y2} stroke="#e0ddd8" strokeWidth={0.5} />
          <text x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill="#888" fontFamily={T.sans}>{lbl}</text>
        </g>;
      })}
      {/* series polygons */}
      {series.map((s, si) => {
        if (hidden[si]) return null;
        const pts = s.values.map((v, i) => [i * angleStep, rScale(v)]);
        const pathD = lineGen(pts);
        return <g key={si}>
          <path d={pathD} fill={s.color} fillOpacity="0.12" stroke={s.color} strokeWidth="1.5" transform={`translate(${cx},${cy})`} />
          {s.values.map((v, i) => {
            const a = i * angleStep - Math.PI / 2;
            const px = cx + rScale(v) * Math.cos(a), py = cy + rScale(v) * Math.sin(a);
            const tipText = s.name + " – " + chart.dimLabels[i] + ": " + v.toFixed(2);
            return <circle key={i} cx={px} cy={py} r={3} fill={s.color} style={{cursor:"default"}}
              onMouseEnter={e => show(e, tipText)} onMouseLeave={hide} onTouchStart={e => show(e, tipText)} />;
          })}
        </g>;
      })}
    </svg>
    <div style={{ display:"flex", gap:10, flexWrap:"wrap", justifyContent:"center", marginTop:4 }}>
      {series.map((s, i) => <span key={i} onClick={() => setHidden(h => ({...h, [i]: !h[i]}))}
        style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, cursor:"pointer", opacity:hidden[i]?0.3:1, fontFamily:T.sans }}>
        <span style={{ width:10, height:10, borderRadius:2, background:s.color }} />{s.name}
      </span>)}
    </div>
    <Tooltip tip={tip} />
  </div>;
}

/* --- BUBBLES CHART (d3.pack) --- */
function BubblesChart({ chart, data, total, lg }) {
  const { tip, show, hide } = useTooltip();
  const items = useMemo(() => {
    const codes = chart.labels.map((_, i) => i + 1);
    return codes.map((code, i) => ({
      label: chart.labels[i], id: i,
      count: data.filter(r => (r[chart.source] || []).includes(code)).length
    }));
  }, [data, chart]);

  const packed = useMemo(() => {
    const root = d3.hierarchy({ children: items }).sum(d => d.count || 1);
    d3.pack().size([200, 200]).padding(4)(root);
    return root.leaves();
  }, [items]);

  return <div style={{ marginBottom:16 }}>
    {chart.title && <div style={{ fontSize:S(12,lg), fontWeight:600, color:"#555", marginBottom:6, fontFamily:T.sans }}>{chart.title}{chart.note && <span style={{ fontWeight:400, color:"#999", marginLeft:6, fontSize:11 }}>({chart.note})</span>}</div>}
    <svg viewBox="0 0 200 200" width="100%" style={{ maxWidth:240, display:"block", margin:"0 auto" }}>
      {packed.map((node, i) => {
        const tipText = node.data.label + ": " + node.data.count + " (" + pct(node.data.count, total) + "%)";
        return <g key={i}>
          <circle cx={node.x} cy={node.y} r={node.r} fill={T.chartColors[i % T.chartColors.length]} fillOpacity="0.78" stroke={T.chartColors[i % T.chartColors.length]} strokeWidth="1.5" style={{cursor:"default"}}
            onMouseEnter={e => show(e, tipText)} onMouseLeave={hide} onTouchStart={e => show(e, tipText)} />
          <text x={node.x} y={node.y+3} textAnchor="middle" fontSize={node.r > 20 ? 10 : 8} fill="#fff" fontWeight="600" fontFamily={T.sans} pointerEvents="none">{node.data.count}</text>
          <text x={node.x} y={node.y+node.r+11} textAnchor="middle" fontSize="8" fill="#666" fontFamily={T.sans} pointerEvents="none">{node.data.label}</text>
        </g>;
      })}
    </svg>
    <Tooltip tip={tip} />
  </div>;
}

/* --- VENN 2-CIRCLE DIAGRAM --- */
function VennChart({ chart, data, total, lg }) {
  const { tip, show, hide } = useTooltip();
  const src = chart.source;
  const onlyA = data.filter(r => { const d = r[src]||[]; return d.includes(1) && !d.includes(2); }).length;
  const onlyB = data.filter(r => { const d = r[src]||[]; return !d.includes(1) && d.includes(2); }).length;
  const both = data.filter(r => { const d = r[src]||[]; return d.includes(1) && d.includes(2); }).length;

  const countA = onlyA + both, countB = onlyB + both;
  const maxCount = Math.max(countA, countB, 1);
  const rScale = d3.scaleSqrt().domain([0, maxCount]).range([0, 65]);
  const rA = Math.max(rScale(countA), 20), rB = Math.max(rScale(countB), 20);

  const totalAB = onlyA + onlyB + both;
  const overlap = totalAB > 0 ? both / totalAB : 0;
  const dx = (rA + rB) * (1 - overlap * 0.7);
  const svgW = dx + rA + rB + 40;
  const cxA = rA + 20, cxB = cxA + dx, cy = 80;

  const tipA = chart.labels[0] + " (nur): " + onlyA + " (" + pct(onlyA, total) + "%)";
  const tipB = chart.labels[1] + " (nur): " + onlyB + " (" + pct(onlyB, total) + "%)";
  const tipBoth = "Beide: " + both + " (" + pct(both, total) + "%)";

  return <div style={{ marginBottom:16 }}>
    {chart.title && <div style={{ fontSize:S(12,lg), fontWeight:600, color:"#555", marginBottom:6, fontFamily:T.sans }}>{chart.title}{chart.note && <span style={{ fontWeight:400, color:"#999", marginLeft:6, fontSize:11 }}>({chart.note})</span>}</div>}
    <svg viewBox={"0 0 " + svgW + " 160"} width="100%" style={{ maxWidth:Math.min(svgW, 350) }}>
      <circle cx={cxA} cy={cy} r={rA} fill={T.chartColors[0]} fillOpacity="0.3" stroke={T.chartColors[0]} strokeWidth="1.5"
        onMouseEnter={e => show(e, tipA)} onMouseLeave={hide} onTouchStart={e => show(e, tipA)} style={{cursor:"default"}} />
      <circle cx={cxB} cy={cy} r={rB} fill={T.chartColors[1]} fillOpacity="0.3" stroke={T.chartColors[1]} strokeWidth="1.5"
        onMouseEnter={e => show(e, tipB)} onMouseLeave={hide} onTouchStart={e => show(e, tipB)} style={{cursor:"default"}} />
      {both > 0 && <circle cx={(cxA+cxB)/2} cy={cy} r={Math.min(rA,rB)*0.4} fill="transparent"
        onMouseEnter={e => show(e, tipBoth)} onMouseLeave={hide} onTouchStart={e => show(e, tipBoth)} style={{cursor:"default"}} />}
      <text x={cxA - rA*0.3} y={cy+4} textAnchor="middle" fontSize="12" fill="#333" fontWeight="600" fontFamily={T.sans}>{onlyA}</text>
      <text x={(cxA+cxB)/2} y={cy+4} textAnchor="middle" fontSize="12" fill="#333" fontWeight="600" fontFamily={T.sans}>{both}</text>
      <text x={cxB + rB*0.3} y={cy+4} textAnchor="middle" fontSize="12" fill="#333" fontWeight="600" fontFamily={T.sans}>{onlyB}</text>
      <text x={cxA} y={cy+rA+14} textAnchor="middle" fontSize="9" fill="#666" fontFamily={T.sans}>{chart.labels[0]}</text>
      <text x={cxB} y={cy+rB+14} textAnchor="middle" fontSize="9" fill="#666" fontFamily={T.sans}>{chart.labels[1]}</text>
    </svg>
    <Tooltip tip={tip} />
  </div>;
}

/* --- DIVERGING 3-OPTION BAR --- */
function DivergingChart({ chart, data, total, lg }) {
  const { tip, show, hide } = useTooltip();
  const opts = chart.options;
  const counts = opts.map(o => data.filter(r => r[chart.source] === o.value).length);
  const t = d3.sum(counts);
  const pcts = counts.map(c => t > 0 ? c / t * 100 : 0);

  return <div style={{ marginBottom:16 }}>
    <svg viewBox="0 0 200 24" width="100%" style={{ maxWidth:500 }}>
      {(() => {
        let x = 0;
        return opts.map((o, i) => {
          const w = pcts[i] * 2;
          const tipText = o.label + ": " + counts[i] + " (" + pcts[i].toFixed(1) + "%)";
          const el = <g key={i}>
            <rect x={x} y={0} width={Math.max(w, 0.5)} height={18} fill={o.color}
              onMouseEnter={e => show(e, tipText)} onMouseLeave={hide} onTouchStart={e => show(e, tipText)} style={{cursor:"default"}} />
            {pcts[i] > 10 && <text x={x + w/2} y={12} textAnchor="middle" fontSize="9" fill="#fff" fontWeight="600" fontFamily={T.sans}>{pcts[i].toFixed(0)}%</text>}
          </g>;
          x += w;
          return el;
        });
      })()}
    </svg>
    <div style={{ display:"flex", justifyContent:"space-between", fontSize:S(10,lg), color:"#888", marginTop:2, fontFamily:T.sans }}>
      <span>{"← " + opts[0].label}</span>
      {opts.length > 2 && <span>{opts[1].label}</span>}
      <span>{opts[opts.length-1].label + " →"}</span>
    </div>
    <Tooltip tip={tip} />
  </div>;
}

/* ========== FILTER SYSTEM ========== */
function useFilterPanel(ds) {
  const allData = ds.records;
  const initFilter = useMemo(() => {
    const f = {};
    (ds.filters || []).forEach(fl => f[fl.key] = null);
    return f;
  }, [ds]);
  const [filter, setFilter] = useState(initFilter);
  useEffect(() => { setFilter(initFilter); }, [initFilter]);

  const isFiltered = Object.values(filter).some(v => v !== null);

  const filtered = useMemo(() => {
    if (!isFiltered) return allData;
    return allData.filter(r => {
      for (const f of ds.filters) {
        const fv = filter[f.key];
        if (fv === null) continue;
        const rv = r[f.source];
        if (f.type === "histogram") {
          if (String(rv) !== String(fv)) return false;
        } else if (f.type === "histogram_range") {
          if (rv < fv.min || rv > fv.max) return false;
        } else if (f.type === "toggle") {
          if (rv !== fv) return false;
        }
      }
      return true;
    });
  }, [allData, filter, isFiltered, ds.filters]);

  /* Cross-counts: for each filter, apply all OTHER active filters */
  const crossCounts = useMemo(() => {
    const cc = {};
    for (const f of ds.filters) {
      if (!isFiltered) { cc[f.key] = allData; continue; }
      cc[f.key] = allData.filter(r => {
        for (const f2 of ds.filters) {
          if (f2.key === f.key) continue;
          const fv = filter[f2.key];
          if (fv === null) continue;
          const rv = r[f2.source];
          if (f2.type === "histogram") {
            if (String(rv) !== String(fv)) return false;
          } else if (f2.type === "histogram_range") {
            if (rv < fv.min || rv > fv.max) return false;
          } else if (f2.type === "toggle") {
            if (rv !== fv) return false;
          }
        }
        return true;
      });
    }
    return cc;
  }, [allData, filter, isFiltered, ds.filters]);

  const toggle = (key, val) => setFilter(f => ({ ...f, [key]: f[key] === val ? null : val }));
  const reset = () => setFilter(initFilter);

  return { filtered, filter, isFiltered, crossCounts, toggle, reset, allData };
}

function FilterPanel({ ds, filterState, fontSize }) {
  const lg = fontSize;
  const { filtered, filter, isFiltered, crossCounts, toggle, reset, allData } = filterState;
  const N = allData.length;
  const n = filtered.length;

  return (
    <div style={{ position:"fixed", bottom:0, left:0, right:0, zIndex:40, background:"#fff", borderTop:"1px solid #eae7e2", padding:"12px 16px 10px", boxShadow:"0 -2px 10px rgba(0,0,0,0.06)" }}>
      <div style={{ maxWidth:640, margin:"0 auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
          <span style={{ fontSize:fontSize==="large"?14:12, fontWeight:600, color:"#555", fontFamily:T.sans }}>
            Filter {isFiltered && <span style={{ color:T.red[2], fontWeight:500 }}>{" · " + n + "/" + N}</span>}
          </span>
          {isFiltered && <button onClick={reset} style={{ fontSize:11, padding:"2px 10px", border:"1px solid "+T.goldLight, borderRadius:T.radius, background:"#faf8f5", cursor:"pointer", color:"#888", fontFamily:T.sans }}>✕ Reset</button>}
        </div>
        {isFiltered && <div style={{ fontSize:11, color:T.red[2], marginBottom:6, padding:"4px 8px", background:"#fef5f5", borderRadius:4, border:"1px solid #fde0e0", fontFamily:T.sans }}>
          {"Aktiver Filter — Grafiken zeigen nur die Auswahl (" + n + " von " + N + ")"}
        </div>}
        <div style={{ display:"flex", gap:12, flexWrap:"wrap", alignItems:"flex-start", justifyContent:"center" }}>
          {(ds.filters || []).map(f => {
            const crossData = crossCounts[f.key] || allData;
            if (f.type === "histogram") {
              const cats = f.categories;
              const counts = cats.map(cat => crossData.filter(r => { const rv = r[f.source]; return rv != null && String(rv) === String(cat); }).length);
              const maxC = Math.max(...counts, 1);
              return <div key={f.key} style={{ minWidth:100, maxWidth:240, flex:"1 1 auto" }}>
                <div style={{ fontSize:10, color:"#999", marginBottom:8, fontFamily:T.sans, lineHeight:1.3 }}>{f.label} <span style={{ fontSize:9 }}>(klicken)</span></div>
                <div style={{ display:"flex", alignItems:"flex-end", gap:1, height:48, justifyContent:"center" }}>
                  {counts.map((c, i) => {
                    const sel = filter[f.key] === cats[i];
                    const dim = filter[f.key] !== null && !sel;
                    return <div key={i} onClick={() => toggle(f.key, cats[i])} style={{ width:30, display:"flex", flexDirection:"column", alignItems:"center", cursor:"pointer", opacity:dim?0.25:1, transition:"opacity 0.2s" }}>
                      <div style={{ fontSize:8, color:"#999", marginBottom:1, fontFamily:T.sans }}>{c}</div>
                      <div style={{ width:22, height:Math.max(3, c/maxC*34), background:sel?T.red[2]:T.red[0]+"60", borderRadius:"3px 3px 0 0", transition:"all 0.3s", border:sel?"2px solid "+T.red[1]:"2px solid transparent" }} />
                      <div style={{ fontSize:7, color:"#777", marginTop:4, textAlign:"center", lineHeight:1.2, wordBreak:"break-word", width:30, fontFamily:T.sans, minHeight:20, display:"flex", alignItems:"flex-start", justifyContent:"center" }}>{f.labels[i]}</div>
                    </div>;
                  })}
                </div>
              </div>;
            }
            if (f.type === "histogram_range") {
              const groups = f.groups;
              const counts = groups.map(g => crossData.filter(r => { const rv = r[f.source]; return rv != null && rv >= g.min && rv <= g.max; }).length);
              const maxC = Math.max(...counts, 1);
              return <div key={f.key} style={{ minWidth:100, maxWidth:240, flex:"1 1 auto" }}>
                <div style={{ fontSize:10, color:"#999", marginBottom:8, fontFamily:T.sans, lineHeight:1.3 }}>{f.label} <span style={{ fontSize:9 }}>(klicken)</span></div>
                <div style={{ display:"flex", alignItems:"flex-end", gap:1, height:48, justifyContent:"center" }}>
                  {counts.map((c, i) => {
                    const g = groups[i];
                    const sel = filter[f.key] && filter[f.key].min === g.min && filter[f.key].max === g.max;
                    const dim = filter[f.key] !== null && !sel;
                    return <div key={i} onClick={() => toggle(f.key, g)} style={{ width:30, display:"flex", flexDirection:"column", alignItems:"center", cursor:"pointer", opacity:dim?0.25:1, transition:"opacity 0.2s" }}>
                      <div style={{ fontSize:8, color:"#999", marginBottom:1, fontFamily:T.sans }}>{c}</div>
                      <div style={{ width:22, height:Math.max(3, c/maxC*34), background:sel?T.red[2]:T.red[0]+"60", borderRadius:"3px 3px 0 0", transition:"all 0.3s", border:sel?"2px solid "+T.red[1]:"2px solid transparent" }} />
                      <div style={{ fontSize:7, color:"#777", marginTop:4, textAlign:"center", lineHeight:1.2, wordBreak:"break-word", width:30, fontFamily:T.sans, minHeight:20, display:"flex", alignItems:"flex-start", justifyContent:"center" }}>{g.label}</div>
                    </div>;
                  })}
                </div>
              </div>;
            }
            if (f.type === "toggle") {
              return <div key={f.key} style={{ minWidth:80 }}>
                <div style={{ fontSize:10, color:"#999", marginBottom:8, fontFamily:T.sans, lineHeight:1.3 }}>{f.label}</div>
                <div style={{ display:"flex", gap:4 }}>
                  {f.values.map((v, i) => {
                    const sel = filter[f.key] === v;
                    const c = crossData.filter(r => r[f.source] === v).length;
                    return <button key={v} onClick={() => toggle(f.key, v)}
                      style={{ padding:"3px 8px", fontSize:10, border:"1px solid "+(sel?T.red[2]:T.goldLight), borderRadius:T.radius, background:sel?"#fef5f5":"#faf8f5", color:sel?T.red[2]:"#777", cursor:"pointer", fontFamily:T.sans }}>
                      {f.labels[i]} <span style={{ fontSize:8, color:"#bbb" }}>({c})</span>
                    </button>;
                  })}
                </div>
              </div>;
            }
            return null;
          })}
        </div>
      </div>
    </div>
  );
}

            </div>
          ) : sec.type === "open_themes" ? (
            <OpenThemesSection sec={sec} lg={lg} />
          ) : (
            renderCharts(sec.charts || [])
          )}
        </Sec>
      ))}
      <FilterPanel ds={ds} filterState={filterState} fontSize={fontSize} />
    </div>
  );
}

/* ========== NAVBAR ========== */
function Navbar({ fontSize, setFontSize, cb, setCb, lang, setLang }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [infoOpen, setInfoOpen] = useState(false);
  return <>
    <nav style={{ position:"fixed", top:0, left:0, right:0, zIndex:50, background:"#faf8f5", borderBottom:"1px solid #eae7e2", padding:"0 16px", height:48, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
        <svg width="28" height="28" viewBox="0 0 28 28"><rect width="28" height="28" rx="6" fill={T.red[1]} /><text x="14" y="19" textAnchor="middle" fill="#fff" fontSize="14" fontFamily="Noto Serif, serif" fontWeight="700">M</text></svg>
      </div>
      <div style={{ fontFamily:T.serif, fontSize:15, fontWeight:700, color:T.red[1], letterSpacing:0.5 }}>Moosburg Data Hub</div>
      <button onClick={() => setMenuOpen(!menuOpen)} style={{ background:"none", border:"none", cursor:"pointer", padding:4, color:T.red[1], fontSize:20, lineHeight:1 }} aria-label="Menü">
        {menuOpen ? "✕" : "☰"}
      </button>
    </nav>
    {menuOpen && <>
      <div onClick={() => setMenuOpen(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.2)", zIndex:55 }} />
      <div style={{ position:"fixed", top:48, right:0, width:260, maxHeight:"80vh", overflowY:"auto", background:"#fff", borderRadius:"0 0 0 12px", boxShadow:"0 8px 24px rgba(0,0,0,0.12)", zIndex:60, padding:16, fontFamily:T.sans }}>
        <div style={{ paddingBottom:12, borderBottom:"1px solid #eae7e2", marginBottom:12 }}>
          <a href="#" onClick={e => { e.preventDefault(); setInfoOpen(true); setMenuOpen(false); }} style={{ fontSize:13, color:T.red[2], textDecoration:"none" }}>{"ℹ Weitere Informationen →"}</a>
        </div>
        <div style={{ paddingBottom:12, borderBottom:"1px solid #eae7e2", marginBottom:12 }}>
          <div style={{ fontSize:11, color:"#999", marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Sprache</div>
          {[["de","Deutsch"],["en","English"]].map(([code,name]) => {
            const active = lang === code;
            const disabled = code === "en";
            return <div key={code} onClick={() => !disabled && setLang(code)} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", cursor:disabled?"default":"pointer", opacity:disabled?0.35:1 }}>
              <span style={{ width:16, height:16, borderRadius:"50%", border:"2px solid "+(active?T.red[2]:"#ccc"), display:"flex", alignItems:"center", justifyContent:"center" }}>
                {active && <span style={{ width:8, height:8, borderRadius:"50%", background:T.red[2] }} />}
              </span>
              <span style={{ fontSize:13, color:disabled?"#aaa":"#444" }}>{name}</span>
              {disabled && <span style={{ fontSize:10, color:"#bbb", marginLeft:4 }}>(bald verfügbar)</span>}
            </div>;
          })}
        </div>
        <div style={{ paddingBottom:12, borderBottom:"1px solid #eae7e2", marginBottom:12 }}>
          <div style={{ fontSize:11, color:"#999", marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Barrierefreiheit</div>
          <div style={{ fontSize:11, color:"#666", marginBottom:4 }}>Schriftgröße</div>
          {[["normal","Normal"],["large","Groß"]].map(([val,label]) => {
            const active = fontSize === val;
            return <div key={val} onClick={() => setFontSize(val)} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 0", cursor:"pointer" }}>
              <span style={{ width:16, height:16, borderRadius:"50%", border:"2px solid "+(active?T.red[2]:"#ccc"), display:"flex", alignItems:"center", justifyContent:"center" }}>
                {active && <span style={{ width:8, height:8, borderRadius:"50%", background:T.red[2] }} />}
              </span>
              <span style={{ fontSize:13, color:"#444" }}>{label}</span>
            </div>;
          })}
          <div style={{ fontSize:11, color:"#666", marginBottom:4, marginTop:8 }}>Farben</div>
          {[["normal","Normal"],["cb","Farbenblind-sicher"]].map(([val,label]) => {
            const active = (val === "cb") === cb;
            return <div key={val} onClick={() => setCb(val === "cb")} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 0", cursor:"pointer" }}>
              <span style={{ width:16, height:16, borderRadius:"50%", border:"2px solid "+(active?T.red[2]:"#ccc"), display:"flex", alignItems:"center", justifyContent:"center" }}>
                {active && <span style={{ width:8, height:8, borderRadius:"50%", background:T.red[2] }} />}
              </span>
              <span style={{ fontSize:13, color:"#444" }}>{label}</span>
            </div>;
          })}
        </div>
      </div>
    </>}
    <Modal open={infoOpen} onClose={() => setInfoOpen(false)}>
      <h3 style={{ fontFamily:T.serif, fontSize:18, color:T.red[1], marginBottom:12 }}>Moosburg Data Hub</h3>
      <p>Der Moosburg Data Hub ist eine interaktive Plattform der Stadt Moosburg a.d. Isar zur Visualisierung öffentlicher Umfragedaten. Hier werden Ergebnisse verschiedener Datenerhebungen aufbereitet und für alle Bürgerinnen und Bürger zugänglich gemacht.</p>
      <p style={{ marginTop:12 }}>Bei Fragen oder Anregungen wenden Sie sich bitte an die Stadtverwaltung Moosburg.</p>
    </Modal>
  </>;
}

/* ========== DATASET SEARCH ========== */
function DatasetSearch({ selected, onSelect }) {
  const [query, setQuery] = useState("");
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const entries = window.__MANIFEST__.datasets.map(d => ({ key: d.id, label: d.title + " (" + d.year + ", N=" + d.n + ")" }));
  const fil = query.length > 0 ? entries.filter(e => e.label.toLowerCase().includes(query.toLowerCase())) : entries;
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  return <div ref={ref} style={{ position:"relative", margin:"16px auto", maxWidth:600 }}>
    <input type="text" placeholder="Datenerhebung suchen…" value={query}
      onChange={e => { setQuery(e.target.value); setOpen(true); }} onFocus={() => setOpen(true)}
      style={{ width:"100%", padding:"10px 14px", border:"1px solid "+T.goldLight, borderRadius:T.radius+2, fontSize:14, background:"#faf8f5", color:"#333", outline:"none", boxSizing:"border-box", fontFamily:T.sans }} />
    {open && fil.length > 0 && (
      <div style={{ position:"absolute", top:"100%", left:0, right:0, background:"#fff", border:"1px solid "+T.goldLight, borderRadius:"0 0 "+T.radius+"px "+T.radius+"px", boxShadow:"0 4px 12px rgba(0,0,0,0.08)", zIndex:20, maxHeight:200, overflowY:"auto" }}>
        {fil.map(e => (
          <div key={e.key} onClick={() => { onSelect(e.key); setQuery(e.label); setOpen(false); }}
            style={{ padding:"10px 14px", cursor:"pointer", fontSize:13, color:selected===e.key?T.red[2]:"#444", fontWeight:selected===e.key?600:400, borderBottom:"1px solid #f5f3f0", fontFamily:T.sans }}
            onMouseEnter={e2 => e2.currentTarget.style.background="#faf8f5"} onMouseLeave={e2 => e2.currentTarget.style.background="#fff"}>
            {e.label}
          </div>
        ))}
      </div>
    )}
    {selected && <button onClick={() => { onSelect(null); setQuery(""); }} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"#999", fontSize:16 }}>✕</button>}
  </div>;
}

/* ========== APP ROOT ========== */
function App() {
  const [dsKey, setDsKey] = useState(null);
  const [fontSize, setFontSize] = useState("normal");
  const [cb, setCb] = useState(false);
  const [lang, setLang] = useState("de");
  const [impOpen, setImpOpen] = useState(false);
  const [conOpen, setConOpen] = useState(false);
  const { ds, loading } = useDataset(dsKey);
  const lg = fontSize;

  return <>
    <FontLoader />
    <div style={{ fontFamily:T.sans, fontSize:fontSize==="large"?16:14, color:"#333", background:"#fff", minHeight:"100vh" }}>
      <Navbar fontSize={fontSize} setFontSize={setFontSize} cb={cb} setCb={setCb} lang={lang} setLang={setLang} />
      <div style={{ maxWidth:640, margin:"0 auto", padding:"56px 16px 0" }}>
        <DatasetSearch selected={dsKey} onSelect={setDsKey} />
        {!dsKey && (

            <div style={{ display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap", marginTop:20 }}>

                <button key={d.id} onClick={() => setDsKey(d.id)}
                  style={{ padding:"10px 16px", borderRadius:T.radius, border:"1px solid "+T.goldLight, background:"#faf8f5", cursor:"pointer", fontSize:13, color:"#555", fontFamily:T.sans, transition:"all 0.2s" }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor=T.red[2]; e.currentTarget.style.color=T.red[2]; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor=T.goldLight; e.currentTarget.style.color="#555"; }}>

            <div className="spinner" style={{ width:36, height:36, border:"3px solid #eae7e2", borderTopColor:T.red[1], borderRadius:"50%", animation:"spin 0.8s linear infinite", margin:"0 auto 16px" }} />
            <div style={{ color:"#999", fontFamily:T.sans, fontSize:13 }}>Daten werden geladen...</div>
          </div>
        )}
        {dsKey && ds && <Dashboard ds={ds} fontSize={fontSize} cb={cb} />}
      </div>
      <footer style={{ padding:"12px 16px 14px", textAlign:"center", fontSize:S(11,lg), color:"#aaa", background:"#faf8f5", borderTop:"1px solid #eae7e2", fontFamily:T.sans }}>
        <a href="#" onClick={e => { e.preventDefault(); setImpOpen(true); }} style={{ color:T.gold, textDecoration:"none", marginRight:16 }}>Impressum</a>
        <a href="#" onClick={e => { e.preventDefault(); setConOpen(true); }} style={{ color:T.gold, textDecoration:"none" }}>Kontakt</a>
        <div style={{ marginTop:6, fontSize:10 }}>{"© " + new Date().getFullYear() + " Stadt Moosburg a.d. Isar"}</div>
      </footer>
      <Modal open={impOpen} onClose={() => setImpOpen(false)}>
        <h3 style={{ fontFamily:T.serif, fontSize:18, color:T.red[1], marginBottom:12 }}>Impressum</h3>
        <p>Stadt Moosburg a.d. Isar<br/>Stadtplatz 13<br/>85368 Moosburg a.d. Isar</p>
        <p style={{ marginTop:8 }}>Vertreten durch den Ersten Bürgermeister.<br/>Platzhalter — wird später ersetzt.</p>
      </Modal>
      <Modal open={conOpen} onClose={() => setConOpen(false)}>
        <h3 style={{ fontFamily:T.serif, fontSize:18, color:T.red[1], marginBottom:12 }}>Kontakt</h3>
        <p>E-Mail: info@moosburg.de<br/>Telefon: +49 (0) 8761 / 000-0</p>
        <p style={{ marginTop:8 }}>Platzhalter — wird später ersetzt.</p>
      </Modal>
    </div>
  </>;
}
  </script>
</body>
