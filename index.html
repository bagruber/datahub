            <div style={{width:2,background:"#ccc",flexShrink:0,zIndex:2}}/>
            <div style={{width:"50%",display:"flex"}}>
              {rightSegs.map((s,i)=><div key={i} onMouseEnter={e=>showTip(e,s)} onMouseLeave={hideTip} onTouchStart={e=>{const t=e.touches[0];setTipPos({x:t.clientX,y:t.clientY});setTipInfo(`Wert ${s.v}: ${s.n} (${pct(s.n,total)} %)`);setTimeout(hideTip,2000)}} style={{width:`${s.w/48*100}%`,height:"100%",background:s.c,transition:"width 0.4s ease",borderRadius:i===2?"0 3px 3px 0":"0"}}/>)}
            </div>
            {tipInfo&&<div style={{position:"fixed",top:tipPos.y-40,left:Math.min(tipPos.x+10,window.innerWidth-180),background:"#fff",border:"1px solid #e0dcd4",borderRadius:6,padding:"4px 9px",fontSize:11,zIndex:200,pointerEvents:"none",whiteSpace:"nowrap",boxShadow:"0 2px 8px rgba(0,0,0,0.10)",color:"#333"}}>{tipInfo}</div>}
          </div>
        </div>
      )
    }

    function SectionHeading({children,fs}){
      return <h2 style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:fs==="large"?20:16,textTransform:"uppercase",letterSpacing:1.5,color:CI.red2,marginBottom:8,marginTop:0}}>{children}</h2>
    }

    function SectionWrap({title,children,infoText,fs}){
      const[showInfo,setShowInfo]=useState(false);
      return(
        <section style={{padding:"24px 0",borderBottom:"1px solid #ede7d9"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <SectionHeading fs={fs}>{title}</SectionHeading>
            {infoText&&<button onClick={()=>setShowInfo(true)} style={{width:22,height:22,borderRadius:"50%",border:`1px solid ${CI.goldLight}`,background:"#faf8f4",fontSize:11,cursor:"pointer",color:CI.gold,fontWeight:600,lineHeight:"20px",padding:0,flexShrink:0}}>?</button>}
          </div>
          {children}
          {showInfo&&<InfoModal title={title} text={infoText} onClose={()=>setShowInfo(false)}/>}
        </section>
      )
    }

    function Summary({children,fs}){
      return <p style={{fontSize:fs==="large"?15:13,lineHeight:1.7,color:"#555",marginTop:0,marginBottom:14,fontFamily:"'DM Sans',sans-serif"}} dangerouslySetInnerHTML={{__html:children}}/>
    }

    function HamburgerMenu({lang,setLang,fontSize,setFontSize,cbMode,setCbMode}){
      const[open,setOpen]=useState(false);
      const optStyle=(active,disabled)=>({
        padding:"7px 14px",borderRadius:6,cursor:disabled?"not-allowed":"pointer",
        background:active?"#faf0f0":"transparent",border:active?`1.5px solid ${CI.red3}`:"1.5px solid transparent",
        opacity:disabled?0.4:1,fontSize:13,color:active?CI.red2:"#555",fontWeight:active?600:400,
        fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s",position:"relative"
      });
      return(
        <>
          <button onClick={()=>setOpen(!open)} aria-label="Menü" style={{background:"none",border:"none",cursor:"pointer",padding:4,display:"flex",flexDirection:"column",gap:3.5,justifyContent:"center"}}>
            <span style={{width:20,height:2,background:CI.red2,borderRadius:1,display:"block"}}/>
            <span style={{width:20,height:2,background:CI.red2,borderRadius:1,display:"block"}}/>
            <span style={{width:20,height:2,background:CI.red2,borderRadius:1,display:"block"}}/>
          </button>
          {open&&<>
            <div onClick={()=>setOpen(false)} style={{position:"fixed",inset:0,zIndex:100}}/>
            <div style={{position:"absolute",top:48,right:12,width:260,background:"#fff",borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,0.14)",zIndex:101,overflow:"hidden",border:"1px solid #ede7d9"}}>
              <div style={{padding:"14px 18px",borderBottom:"1px solid #ede7d9"}}>
                <a href="#" onClick={e=>{e.preventDefault();setOpen(false)}} style={{fontSize:13,color:CI.blue,textDecoration:"none",fontFamily:"'DM Sans',sans-serif"}}>ℹ Weiterführende Informationen</a>
              </div>
              <div style={{padding:"14px 18px",borderBottom:"1px solid #ede7d9"}}>
                <div style={{fontSize:11,color:"#999",textTransform:"uppercase",letterSpacing:0.8,marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Sprache</div>
                <div style={{display:"flex",gap:6}}>
                  <span onClick={()=>setLang("de")} style={optStyle(lang==="de",false)}>Deutsch</span>
                  <span style={{...optStyle(lang==="en",true),position:"relative"}}>
                    English
                    <span style={{position:"absolute",top:-6,right:-6,background:CI.gold,color:"#fff",fontSize:8,padding:"1px 5px",borderRadius:8,fontWeight:600,whiteSpace:"nowrap"}}>bald</span>
                  </span>
                </div>
              </div>
              <div style={{padding:"14px 18px"}}>
                <div style={{fontSize:11,color:"#999",textTransform:"uppercase",letterSpacing:0.8,marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Barrierefreiheit</div>
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <span onClick={()=>setFontSize("normal")} style={optStyle(fontSize==="normal",false)}>Aa Normal</span>
                  <span onClick={()=>setFontSize("large")} style={optStyle(fontSize==="large",false)}>Aa Groß</span>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <span onClick={()=>setCbMode(false)} style={optStyle(!cbMode,false)}>Farben Normal</span>
                  <span onClick={()=>setCbMode(true)} style={optStyle(cbMode,false)}>Kontrastreich</span>
                </div>
              </div>
            </div>
          </>}
        </>
      )
    }

    function SearchBar({selected,onSelect,fs}){
      const[query,setQuery]=useState("");
      const[showDrop,setShowDrop]=useState(false);
      const ref=useRef();
      const matches=DATASETS.filter(d=>d.label.toLowerCase().includes(query.toLowerCase())||String(d.year).includes(query));

      useEffect(()=>{
        const handler=e=>{if(ref.current&&!ref.current.contains(e.target))setShowDrop(false)};
        document.addEventListener("mousedown",handler);return()=>document.removeEventListener("mousedown",handler);
      },[]);

      return(
        <div ref={ref} style={{position:"relative",margin:"12px 0 4px"}}>
          <input
            value={selected?`${selected.label} (${selected.year}, N=${selected.n})`:query}
            onChange={e=>{setQuery(e.target.value);setShowDrop(true);if(selected)onSelect(null)}}
            onFocus={()=>setShowDrop(true)}
            placeholder="Datensatz suchen…"
            style={{width:"100%",padding:fs==="large"?"12px 16px":"10px 14px",border:`1.5px solid ${CI.goldLight}`,borderRadius:8,fontSize:fs==="large"?15:13,fontFamily:"'DM Sans',sans-serif",background:"#faf8f4",outline:"none",color:"#333",boxSizing:"border-box",transition:"border-color 0.2s"}}
            onFocus={e=>e.target.style.borderColor=CI.red3}
            onBlur={e=>e.target.style.borderColor=CI.goldLight}
          />
          {showDrop&&!selected&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:`1px solid ${CI.goldLight}`,borderRadius:8,marginTop:4,boxShadow:"0 4px 16px rgba(0,0,0,0.08)",zIndex:50,overflow:"hidden"}}>
              {matches.length===0&&<div style={{padding:"10px 14px",fontSize:12,color:"#999"}}>Keine Datensätze gefunden</div>}
              {matches.map(d=>(
                <div key={d.id} onClick={()=>{onSelect(d);setShowDrop(false);setQuery("")}} style={{padding:"10px 14px",cursor:"pointer",fontSize:fs==="large"?14:13,color:"#333",fontFamily:"'DM Sans',sans-serif",borderBottom:"1px solid #f5f2ed",transition:"background 0.1s"}} onMouseEnter={e=>e.currentTarget.style.background="#faf0f0"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <strong>{d.label}</strong> <span style={{color:"#999"}}>({d.year}, N={d.n})</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )
    }

    function BottomFilterBar({filter,setFilter,fs}){
      const ageCounts=AGE.map((_,i)=>D.filter(r=>r[0]===i).length);
      const ageMax=Math.max(...ageCounts);
      const moosCounts=[D.filter(r=>r[1]===1).length,D.filter(r=>r[1]===0).length];
      const isFiltered=filter.age!==null||filter.moos!==null;
      const n=D.filter(r=>{
        if(filter.age!==null&&r[0]!==filter.age)return false;
        if(filter.moos!==null&&r[1]!==filter.moos)return false;
        return true;
      }).length;

      return(
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:80,background:"#fff",borderTop:`2px solid ${CI.goldLight}`,padding:"8px 16px 10px",boxShadow:"0 -4px 20px rgba(0,0,0,0.06)"}}>
          <div style={{maxWidth:640,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:fs==="large"?13:11,fontFamily:"'Playfair Display',serif",textTransform:"uppercase",letterSpacing:1,color:CI.red2,fontWeight:700}}>Filter</span>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:fs==="large"?13:11,color:isFiltered?CI.red3:"#aaa",fontWeight:isFiltered?600:400,fontFamily:"'DM Sans',sans-serif"}}>
                  {isFiltered?`${n} / ${D.length}`:`N = ${D.length}`}
                  {filter.age!==null&&` · ${AGE[filter.age]}`}
                  {filter.moos!==null&&` · ${filter.moos===1?"Moosburg":"Auswärtig"}`}
                </span>
                {isFiltered&&<button onClick={()=>setFilter({age:null,moos:null})} style={{fontSize:10,padding:"2px 8px",border:`1px solid ${CI.goldLight}`,borderRadius:4,background:"#faf8f4",cursor:"pointer",color:"#999",fontFamily:"'DM Sans',sans-serif"}}>✕</button>}
              </div>
            </div>
            <div style={{display:"flex",gap:12,alignItems:"flex-end"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"flex-end",gap:2,height:40}}>
                  {ageCounts.map((c,i)=>{
                    const sel=filter.age===i;
                    const dim=filter.age!==null&&!sel;
                    return(
                      <div key={i} onClick={()=>setFilter(f=>({...f,age:f.age===i?null:i}))} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",opacity:dim?0.25:1,transition:"opacity 0.2s"}}>
                        <div style={{fontSize:8,color:"#bbb",marginBottom:1}}>{c}</div>
                        <div style={{width:"100%",height:Math.max(3,c/ageMax*28),background:sel?CI.red3:CI.goldLight,borderRadius:"2px 2px 0 0",transition:"all 0.3s",border:sel?`2px solid ${CI.red2}`:"2px solid transparent"}}/>
                        <div style={{fontSize:fs==="large"?10:8,color:sel?CI.red2:"#aaa",marginTop:1,whiteSpace:"nowrap",fontWeight:sel?600:400}}>{AGE[i].replace("Unter ","<").replace("Über ",">")}</div>
                      </div>
                    )
                  })}
                </div>
              </div>
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                {[[1,"Moos.",moosCounts[0]],[0,"Ausw.",moosCounts[1]]].map(([v,l,c])=>{
                  const sel=filter.moos===v;
                  const dim=filter.moos!==null&&!sel;
                  return(
                    <div key={v} onClick={()=>setFilter(f=>({...f,moos:f.moos===v?null:v}))} style={{padding:"4px 8px",borderRadius:6,cursor:"pointer",border:sel?`2px solid ${CI.red3}`:"2px solid transparent",background:sel?"#faf0f0":"#f5f2ed",opacity:dim?0.3:1,transition:"all 0.2s",textAlign:"center",minWidth:42}}>
                      <div style={{fontSize:fs==="large"?15:13,fontWeight:600,color:sel?CI.red2:"#666"}}>{c}</div>
                      <div style={{fontSize:fs==="large"?10:8,color:"#aaa"}}>{l}</div>
                    </div>
                  )
                })}
              </div>
            </div>
          </div>
        </div>
      )
    }

    function DashboardCKM({filter,cbMode,fs}){
      const filtered=useMemo(()=>D.filter(r=>{
        if(filter.age!==null&&r[0]!==filter.age)return false;
        if(filter.moos!==null&&r[1]!==filter.moos)return false;
        return true;
      }),[filter]);
      const n=filtered.length;
      const colors=cbMode?LCB:LN;

      const freqGrouped=useMemo(()=>[
        ["Mehrmals/Jahr",filtered.filter(r=>r[2]===3).length],
        ["Einmal/Jahr",filtered.filter(r=>r[2]===2).length],
        ["Seltener/Nie",filtered.filter(r=>r[2]<=1).length],
      ],[filtered]);
      const dayCounts=countBits(filtered,3,DAYS);
      const timeCounts=countBits(filtered,4,TIMES);
      const durCounts=countBits(filtered,5,DUR);
      const mobCounts=countBits(filtered,6,MOB);

      const likertData=RATINGS.map(([idx,label])=>{
        const counts=[0,0,0,0,0,0];
        filtered.forEach(r=>{const v=r[idx];if(v>=1&&v<=6)counts[v-1]++});
        return{label,counts,total:filtered.filter(r=>r[idx]>=1&&r[idx]<=6).length};
      });

      const barrierCounts=countBits(filtered,16,BARRIERS).sort((a,b)=>b[1]-a[1]);
      const barrierMax=Math.max(...barrierCounts.map(d=>d[1]),1);

      const topRating=likertData.reduce((best,d)=>{const m=d.total>0?d.counts.reduce((s,c,i)=>s+c*(i+1),0)/d.total:0;return m>best.m?{label:d.label,m}:best},{label:"",m:0});
      const bottomRating=likertData.reduce((worst,d)=>{const m=d.total>0?d.counts.reduce((s,c,i)=>s+c*(i+1),0)/d.total:0;return m<worst.m||worst.m===0?{label:d.label,m}:worst},{label:"",m:99});

      return(
        <div>
          <SectionWrap title="Besuchsverhalten" fs={fs}>
            <Summary fs={fs}>
              <strong>{pct(freqGrouped[0][1],n)} %</strong> besuchen den Markt mehrmals im Jahr. <strong>Samstag</strong> und der <strong>Abend</strong> sind die beliebtesten Besuchszeiten — rund drei Viertel bleiben <strong>länger als eine Stunde</strong>.
            </Summary>
            <div style={{fontSize:fs==="large"?12:11,fontWeight:500,color:CI.gold,marginBottom:4,fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase",letterSpacing:0.5}}>Häufigkeit</div>
            {freqGrouped.map(([l,c],i)=><HBar key={l} label={l} value={c} maxVal={n} color={BAR_COLORS[0]} count={c} total={n} fs={fs}/>)}
            <div style={{fontSize:fs==="large"?12:11,fontWeight:500,color:CI.gold,marginTop:14,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Besuchstage</div>
            {dayCounts.map(([l,c])=><HBar key={l} label={l} value={c} maxVal={Math.max(...dayCounts.map(d=>d[1]))} color={BAR_COLORS[1]} count={c} total={n} fs={fs}/>)}
            <div style={{fontSize:fs==="large"?12:11,fontWeight:500,color:CI.gold,marginTop:14,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Uhrzeiten</div>
            {timeCounts.map(([l,c])=><HBar key={l} label={l} value={c} maxVal={Math.max(...timeCounts.map(d=>d[1]))} color={BAR_COLORS[2]} count={c} total={n} fs={fs}/>)}
            <div style={{fontSize:fs==="large"?12:11,fontWeight:500,color:CI.gold,marginTop:14,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Aufenthaltsdauer</div>
            {durCounts.map(([l,c])=><HBar key={l} label={l} value={c} maxVal={Math.max(...durCounts.map(d=>d[1]))} color={BAR_COLORS[3]} count={c} total={n} fs={fs}/>)}
            <div style={{fontSize:fs==="large"?12:11,fontWeight:500,color:CI.gold,marginTop:14,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Anreise</div>
            {mobCounts.map(([l,c])=><HBar key={l} label={l} value={c} maxVal={Math.max(...mobCounts.map(d=>d[1]))} color={BAR_COLORS[4]} count={c} total={n} fs={fs}/>)}
          </SectionWrap>

          <SectionWrap title="Bewertungen" infoText="Divergierende Likert-Skala: Die Mittellinie trennt negative (1–3, links) und positive Bewertungen (4–6, rechts). Dunklere Farben zeigen extremere Werte. Hover oder Touch auf ein Segment zeigt die genaue Anzahl." fs={fs}>
            <Summary fs={fs}>
              Am besten bewertet: <strong>{topRating.label}</strong> (Ø {topRating.m.toFixed(1)}). Am kritischsten: <strong>{bottomRating.label}</strong> (Ø {bottomRating.m.toFixed(1)}). Preise werden generell als eher hoch empfunden.
            </Summary>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:fs==="large"?11:9,color:"#bbb",marginBottom:6,padding:`0 0 0 ${fs==="large"?148:128}px`,fontFamily:"'DM Sans',sans-serif"}}>
              <span>← eher negativ</span><span>eher positiv →</span>
            </div>
            {likertData.map((d,i)=><LikertRow key={i} {...d} colors={colors} fs={fs}/>)}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10,fontSize:fs==="large"?11:10,color:"#aaa"}}>
              {[1,2,3,4,5,6].map(v=><span key={v} style={{display:"flex",alignItems:"center",gap:3}}>
                <span style={{width:10,height:10,borderRadius:2,background:colors[v-1]}}/>{v}
              </span>)}
            </div>
          </SectionWrap>

          <SectionWrap title="Was hält vom Besuch ab?" fs={fs}>
            <Summary fs={fs}>
              Häufigster Grund: <strong>{barrierCounts[0]?.[0]}</strong> ({barrierCounts[0]?.[1]} Nennungen). Mehrfachnennungen möglich.
            </Summary>
            {barrierCounts.map(([l,c])=><HBar key={l} label={l} value={c} maxVal={barrierMax} color={cbMode?"#854F0B":CI.red2} count={c} total={n} fs={fs}/>)}
          </SectionWrap>
        </div>
      )
    }

    function App(){
      const[lang,setLang]=useState("de");
      const[fontSize,setFontSize]=useState("normal");
      const[cbMode,setCbMode]=useState(false);
      const[selectedDS,setSelectedDS]=useState(DATASETS[0]);
      const[filter,setFilter]=useState({age:null,moos:null});
      const fs=fontSize;

      return(
        <>
          <div style={{maxWidth:640,margin:"0 auto",padding:"0 16px",fontFamily:"'DM Sans',sans-serif",color:"#333",paddingBottom:110}}>
            <nav style={{position:"sticky",top:0,zIndex:90,background:"#FDFCFA",borderBottom:`1px solid ${CI.goldLighter}`,display:"flex",alignItems:"center",justifyContent:"space-between",height:52,padding:"0 2px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:28,height:28,borderRadius:6,background:`linear-gradient(135deg, ${CI.red3}, ${CI.red1})`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{color:"#fff",fontSize:14,fontWeight:700,fontFamily:"'Playfair Display',serif"}}>M</span>
                </div>
              </div>
              <span style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:fs==="large"?16:14,textTransform:"uppercase",letterSpacing:2,color:CI.red2,position:"absolute",left:"50%",transform:"translateX(-50%)",whiteSpace:"nowrap"}}>Moosburg Data Hub</span>
              <HamburgerMenu lang={lang} setLang={setLang} fontSize={fontSize} setFontSize={setFontSize} cbMode={cbMode} setCbMode={setCbMode}/>
            </nav>

            <SearchBar selected={selectedDS} onSelect={ds=>{setSelectedDS(ds);setFilter({age:null,moos:null})}} fs={fs}/>

            {selectedDS&&selectedDS.id==="ckm2024"&&(
              <div style={{animation:"fadeIn 0.3s ease"}}>
                <div style={{padding:"16px 0 8px",borderBottom:`1px solid ${CI.goldLighter}`}}>
                  <h1 style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:fs==="large"?24:20,textTransform:"uppercase",letterSpacing:2,color:CI.red1,margin:0}}>Christkindlmarkt</h1>
                  <p style={{fontSize:fs==="large"?14:12,color:CI.gold,marginTop:4,fontFamily:"'DM Sans',sans-serif"}}>Umfrage 2024 · {D.length} Teilnehmende</p>
                </div>
                <DashboardCKM filter={filter} cbMode={cbMode} fs={fs}/>
              </div>
            )}

            {!selectedDS&&(
              <div style={{textAlign:"center",padding:"60px 20px",color:"#ccc"}}>
                <div style={{fontSize:32,marginBottom:12}}>📊</div>
                <p style={{fontFamily:"'DM Sans',sans-serif",fontSize:14}}>Datensatz oben auswählen</p>
              </div>
            )}

            <footer style={{padding:"20px 0 12px",textAlign:"center",fontSize:fs==="large"?12:10,color:"#bbb",borderTop:`1px solid ${CI.goldLighter}`,marginTop:24,fontFamily:"'DM Sans',sans-serif"}}>
              <a href="#" style={{color:CI.gold,textDecoration:"none",marginRight:16}}>Impressum</a>
              <a href="#" style={{color:CI.gold,textDecoration:"none"}}>Kontakt</a>
            </footer>
          </div>

          {selectedDS&&<BottomFilterBar filter={filter} setFilter={setFilter} fs={fs}/>}
        </>
      )
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
